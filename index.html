<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="banner">
      <div class="overlay"></div>

      <nav class="navbar">
        <div class="Logo">
          <img src="assets\images\logo.svg" alt="logo" />
        </div>
        <span class="buttons">
          <button class="lan">Englsih</button>
          <button class="signin">Sign In</button>
        </span>
      </nav>
      <div class="banner_content">
        <h1>Unlimited movies, TV shows, and more</h1>
        <h3>Starts at Rs 250. Cancel anytime.</h3>
        <h4>
          Ready to watch? Enter your email to create or restart your membership.
        </h4>
      </div>
      <div class="banner_btn">
        <input type="email" name="Email" placeholder="Email address" />
        <button>Get Started ></button>
      </div>
    </div>
    <main class="main_sec">
      <span class="heading">
        <h2>Trending Now</h2>
      </span>
      <div class="movies">
        <div class="movie">
          <img src="assets\images\First movie pic.jpg" alt="Bhoot Bangla" />
        </div>
        <div class="movie">
          <img
            src="assets\images\second movie pic.jpg"
            alt="The Last Air Sender"
          />
        </div>
        <div class="movie">
          <img
            src="assets\images\Third movie pic.jpg"
            alt="Teach You a Lesson"
          />
        </div>
        <div class="movie">
          <img src="assets\images\Fourth movie pic.jpg" alt="MAA BEHEN" />
        </div>
      </div>
      
    </main>
  </body>
</html>
